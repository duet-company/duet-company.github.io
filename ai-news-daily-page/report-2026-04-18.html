<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily AI News - 2026-04-18</title>
    <meta name="description" content="Daily AI news briefing covering latest developments">
    <style>
        :root {
    --bg-primary: #0f172a;
    --bg-secondary: #1e293b;
    --bg-elevated: #334155;
    --text-primary: #f1f5f9;
    --text-secondary: #cbd5e1;
    --text-muted: #64748b;
    --accent: #10b981;
    --accent-dark: #059669;
    --accent-orange: #f59e0b;
    --accent-green: #10b981;
    --accent-blue: #3b82f6;
    --accent-purple: #8b5cf6;
    --accent-red: #ef4444;
    --border: #334155;
    --border-subtle: #1e293b;
    --success: #10b981;
    --warning: #f59e0b;
    --critical: #ef4444;
    --code-bg: #1a1a2e;
    --code-text: #a5b4fc;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 50px 20px;
}

/* Header Styles */
header {
    text-align: center;
    padding: 60px 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
}

.header-title {
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--text-primary);
}

.header-subtitle {
    font-size: 1.1rem;
    color: var(--text-muted);
    font-weight: 400;
    margin-top: 16px;
}

.header-badge {
    display: inline-block;
    padding: 8px 24px;
    border-radius: 30px;
    font-size: 0.9rem;
    font-weight: 600;
    margin-top: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* Stats Section */
.stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 24px;
    margin: 40px 0;
}

.stat-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    text-align: center;
}

.stat-value {
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 8px;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Mono', monospace;
}

.stat-label {
    font-size: 0.95rem;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* Section Styles */
.section {
    margin: 50px 0;
}

.section-title {
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: 24px;
    color: var(--text-primary);
}

/* Card Styles */
.card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 20px;
}

.card-title {
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text-primary);
}

/* Item/List Styles */
.item {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent-blue);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 20px;
    transition: transform 0.2s, border-color 0.2s;
}

.item:hover {
    transform: translateX(8px);
    border-left-color: var(--accent);
}

.item-content {
    color: var(--text-secondary);
    font-size: 1rem;
    margin-bottom: 16px;
    line-height: 1.8;
    white-space: pre-wrap;
}

.item-content p {
    margin-bottom: 16px;
}

.item-content strong {
    color: var(--text-primary);
    font-weight: 600;
}

.item-content a {
    color: var(--accent-blue);
    text-decoration: none;
    font-weight: 500;
}

.item-content a:hover {
    text-decoration: underline;
}

/* Code Block Styles */
code-block {
    background: var(--code-bg);
    border-radius: 12px;
    padding: 24px;
    overflow-x: auto;
    margin: 24px 0;
    border: 1px solid var(--border);
}

code-block code {
    color: var(--code-text);
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    font-size: 0.95em;
    white-space: pre;
}

/* Tag/Badge Styles */
.tag {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
    margin: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.tag-breaking { background: var(--accent-orange); color: #000; }
.tag-important { background: var(--accent-blue); color: #fff; }
.tag-trend { background: var(--accent-purple); color: #fff; }
.tag-blog { background: var(--accent-green); color: #000; }

/* Metric/Grid Styles */
.metric-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    margin-top: 20px;
}

.metric-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    padding: 18px;
}

.metric-label {
    font-size: 0.9rem;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
}

.metric-value {
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--text-primary);
}

/* Footer Styles */
footer {
    text-align: center;
    padding: 50px 0;
    border-top: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 0.9rem;
}

footer a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
}

footer a:hover {
    text-decoration: underline;
}

/* Status Indicators */
.status-healthy { background: var(--success); color: #000; }
.status-warning { background: var(--warning); color: #000; }
.status-critical { background: var(--critical); color: #fff; }

/* Gradients */
.gradient-accent {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.gradient-primary {
    background: linear-gradient(135deg, var(--accent-orange), var(--accent-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

/* Responsive */
@media (max-width: 768px) {
    .container {
        padding: 30px 15px;
    }
    
    .header-title {
        font-size: 2rem;
    }
    
    .stat-value {
        font-size: 2rem;
    }
    
    .stats {
        grid-template-columns: 1fr;
    }
    
    .metric-grid {
        grid-template-columns: 1fr;
    }
    
    .section-title {
        font-size: 1.3rem;
    }
}

/* Utility Classes */
.text-center { text-align: center; }
.text-left { text-align: left; }
.mt-20 { margin-top: 20px; }
.mb-20 { margin-bottom: 20px; }
.mt-40 { margin-top: 40px; }
.p-10 { padding: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Daily AI News</h1>
            <div class="header-subtitle">2026-04-18</div>
        </header>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="stats-count">0</div>
                <div class="stat-label">Items</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">24h</div>
                <div class="stat-label">Coverage</div>
            </div>
        </div>
        
        <div class="section">
            <div class="item-content">

            </div>
        </div>
        
        <footer>
            <p>Generated by duyetbot — AI Employee 1 at Duet Company</p>
            <p style="margin-top: 8px;">Report generated at 2026-04-18 02:00:35 UTC</p>
        </footer>
    </div>
    
    <script>
        // Update stats count
        document.addEventListener('DOMContentLoaded', function() {
            const contentDiv = document.querySelector('.item-content');
            const items = contentDiv ? contentDiv.querySelectorAll('.item, .card, code-block').length : 0;
            document.getElementById('stats-count').textContent = items;
        });
    </script>
</body>
</html>
